name: iOS IPA GitHub Release

on:
  push:
    tags:
      - "v*"
      - "ios-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag, for example ios-v1.0.0
        required: true
        type: string
        default: ios-v1.0.0
      prerelease:
        description: Mark the GitHub Release as pre-release
        required: true
        type: boolean
        default: true
      export_method:
        description: Xcode export method, for example ad-hoc, development, enterprise, or app-store
        required: true
        type: string
        default: ad-hoc

permissions:
  contents: write

env:
  APP_DIR: Phone_App
  NODE_VERSION: "22"
  IOS_SCHEME: Phone_App
  IOS_WORKSPACE: ios/Phone_App.xcworkspace
  IOS_ARCHIVE_PATH: build/Phone_App.xcarchive
  IOS_EXPORT_PATH: build/ios-export

jobs:
  ios-ipa:
    name: Build and publish IPA
    runs-on: macos-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Generate iOS project
        run: npx expo prebuild --platform ios --clean --non-interactive

      - name: Install CocoaPods dependencies
        run: cd ios && pod install --repo-update

      - name: Install Apple signing assets
        id: signing
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD || github.run_id }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          missing=0
          for name in APPLE_CERTIFICATE_BASE64 APPLE_CERTIFICATE_PASSWORD APPLE_TEAM_ID IOS_PROVISIONING_PROFILE_BASE64; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: ${name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/build_profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/build_profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "$APPLE_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -D > "$PROFILE_PATH"

          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST")"
          PROFILE_NAME_FROM_FILE="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST")"
          PROFILE_NAME="${IOS_PROVISIONING_PROFILE_NAME:-$PROFILE_NAME_FROM_FILE}"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"

          echo "profile_name=${PROFILE_NAME}" >> "$GITHUB_OUTPUT"
          echo "profile_uuid=${PROFILE_UUID}" >> "$GITHUB_OUTPUT"

      - name: Create export options
        id: export_options
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ steps.signing.outputs.profile_name }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            EXPORT_METHOD="${{ inputs.export_method }}"
          else
            EXPORT_METHOD="ad-hoc"
          fi

          BUNDLE_IDENTIFIER="$(node -p "require('./app.json').expo.ios.bundleIdentifier")"
          EXPORT_OPTIONS_PLIST="$RUNNER_TEMP/ExportOptions.plist"

          cat > "$EXPORT_OPTIONS_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${EXPORT_METHOD}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_IDENTIFIER}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          echo "export_method=${EXPORT_METHOD}" >> "$GITHUB_OUTPUT"
          echo "plist_path=${EXPORT_OPTIONS_PLIST}" >> "$GITHUB_OUTPUT"

      - name: Archive iOS app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ steps.signing.outputs.profile_name }}
        run: |
          BUNDLE_IDENTIFIER="$(node -p "require('./app.json').expo.ios.bundleIdentifier")"

          xcodebuild archive \
            -workspace "$IOS_WORKSPACE" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$IOS_ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_IDENTIFIER" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$IOS_ARCHIVE_PATH" \
            -exportPath "$IOS_EXPORT_PATH" \
            -exportOptionsPlist "${{ steps.export_options.outputs.plist_path }}"

      - name: Prepare release files
        id: release_files
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="${{ inputs.release_tag }}"
          fi

          APP_VERSION="$(node -p "require('./app.json').expo.version")"
          BUILD_NUMBER="$(node -p "require('./app.json').expo.ios.buildNumber")"
          BUNDLE_IDENTIFIER="$(node -p "require('./app.json').expo.ios.bundleIdentifier")"
          EXPORT_METHOD="${{ steps.export_options.outputs.export_method }}"
          IPA_SOURCE="$(find "$IOS_EXPORT_PATH" -maxdepth 1 -name '*.ipa' -print -quit)"

          if [ -z "$IPA_SOURCE" ]; then
            echo "::error::No IPA file was exported."
            exit 1
          fi

          IPA_NAME="Phone_App-${RELEASE_TAG}-ios.ipa"
          MANIFEST_NAME="Phone_App-${RELEASE_TAG}-ios-manifest.plist"
          ICON_NAME="Phone_App-${RELEASE_TAG}-ios-icon.png"
          IPA_PATH="release/${IPA_NAME}"
          MANIFEST_PATH="release/${MANIFEST_NAME}"
          ICON_PATH="release/${ICON_NAME}"
          NOTES_PATH="release-notes-ios.md"
          ASSET_BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"
          OTA_URL="itms-services://?action=download-manifest&url=${ASSET_BASE_URL}/${MANIFEST_NAME}"

          mkdir -p release
          cp "$IPA_SOURCE" "$IPA_PATH"
          cp assets/images/icon.png "$ICON_PATH"

          cat > "$MANIFEST_PATH" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>items</key>
            <array>
              <dict>
                <key>assets</key>
                <array>
                  <dict>
                    <key>kind</key>
                    <string>software-package</string>
                    <key>url</key>
                    <string>${ASSET_BASE_URL}/${IPA_NAME}</string>
                  </dict>
                  <dict>
                    <key>kind</key>
                    <string>display-image</string>
                    <key>needs-shine</key>
                    <false/>
                    <key>url</key>
                    <string>${ASSET_BASE_URL}/${ICON_NAME}</string>
                  </dict>
                  <dict>
                    <key>kind</key>
                    <string>full-size-image</string>
                    <key>needs-shine</key>
                    <false/>
                    <key>url</key>
                    <string>${ASSET_BASE_URL}/${ICON_NAME}</string>
                  </dict>
                </array>
                <key>metadata</key>
                <dict>
                  <key>bundle-identifier</key>
                  <string>${BUNDLE_IDENTIFIER}</string>
                  <key>bundle-version</key>
                  <string>${BUILD_NUMBER}</string>
                  <key>kind</key>
                  <string>software</string>
                  <key>title</key>
                  <string>Phone_App</string>
                </dict>
              </dict>
            </array>
          </dict>
          </plist>
          EOF

          {
            echo "# iOS IPA ${RELEASE_TAG}"
            echo
            echo "- App version: ${APP_VERSION}"
            echo "- iOS build number: ${BUILD_NUMBER}"
            echo "- Bundle identifier: ${BUNDLE_IDENTIFIER}"
            echo "- Xcode export method: ${EXPORT_METHOD}"
            echo "- The IPA installs only on devices allowed by the provisioning profile."
            echo
            echo "OTA install link:"
            echo
            echo "${OTA_URL}"
          } > "$NOTES_PATH"

          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "ipa_path=${APP_DIR}/${IPA_PATH}" >> "$GITHUB_OUTPUT"
          echo "manifest_path=${APP_DIR}/${MANIFEST_PATH}" >> "$GITHUB_OUTPUT"
          echo "icon_path=${APP_DIR}/${ICON_PATH}" >> "$GITHUB_OUTPUT"
          echo "notes_path=${APP_DIR}/${NOTES_PATH}" >> "$GITHUB_OUTPUT"
          echo "ipa_name=${IPA_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_files.outputs.ipa_name }}
          path: |
            ${{ steps.release_files.outputs.ipa_path }}
            ${{ steps.release_files.outputs.manifest_path }}
            ${{ steps.release_files.outputs.icon_path }}

      - name: Publish GitHub Release
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_files.outputs.tag }}
          IPA_PATH: ${{ steps.release_files.outputs.ipa_path }}
          MANIFEST_PATH: ${{ steps.release_files.outputs.manifest_path }}
          ICON_PATH: ${{ steps.release_files.outputs.icon_path }}
          NOTES_PATH: ${{ steps.release_files.outputs.notes_path }}
          IS_PRERELEASE: ${{ inputs.prerelease || 'false' }}
        run: |
          PRERELEASE_ARG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$IS_PRERELEASE" = "true" ]; then
            PRERELEASE_ARG="--prerelease"
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$IPA_PATH" "$MANIFEST_PATH" "$ICON_PATH" --clobber
          else
            gh release create "$RELEASE_TAG" "$IPA_PATH" "$MANIFEST_PATH" "$ICON_PATH" \
              --target "$GITHUB_SHA" \
              --title "iOS IPA ${RELEASE_TAG}" \
              --notes-file "$NOTES_PATH" \
              $PRERELEASE_ARG
          fi

      - name: Remove temporary keychain
        if: ${{ always() }}
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
